<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up - Layali Café</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#fbfbfb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:400px;
  background:white;
  padding:30px;
  border:1px solid #eee;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
  font-family:'Cormorant Garamond';
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  background:#111;
  color:white;
  border:none;
  cursor:pointer;
}

.small{
  font-size:12px;
  text-align:center;
  margin-top:10px;
  color:#666;
}
</style>
</head>

<body>

<div class="container">
  <h1>Join Layali Café ☕</h1>

  <input type="text" placeholder="Full Name" id="name">
  <input type="email" placeholder="Email" id="email">
  <input type="password" placeholder="Password" id="password">

  <button onclick="signup()">Create Account</button>

  <p class="small">Earn rewards with every order ✨</p>
</div>

<script>
function signup(){
  let user = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value
  };

  localStorage.setItem("user", JSON.stringify(user));
  alert("Account created successfully ☕✨");
  window.location.href = "index.html";
}
</script>

</body>
</html>
